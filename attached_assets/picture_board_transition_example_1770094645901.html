<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picture Board Transition Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Oswald', sans-serif;
      color: white;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #333;
      color: white;
      border: none;
      border-radius: 4px;
    }

    button:hover {
      background: #444;
    }

    /* Board container - simulates LED display dimensions */
    .board {
      width: 384px;  /* 2x P10 boards side by side, or adjust as needed */
      height: 192px; /* 2x P10 board height */
      position: relative;
      overflow: hidden;
      background: linear-gradient(to bottom, #1a1a1a, #2a2a2a, #3a3a3a);
    }

    /* Background layer - always visible when athlete assigned */
    .background-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #1a1a1a, #2a2a2a, #3a3a3a);
      z-index: 1;
    }

    /* Event header with separator line */
    .header-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 8;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    .header-layer.visible {
      opacity: 1;
    }

    .header-text {
      padding: 6px 0;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    }

    .header-line {
      height: 2px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.8) 15%, rgba(255,255,255,0.8) 85%, transparent);
    }

    /* Athlete content layer */
    .content-layer {
      position: absolute;
      top: 50px; /* Below header */
      left: 0;
      width: 100%;
      height: calc(100% - 50px);
      padding: 8px 16px;
      z-index: 6;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }

    .content-layer.visible {
      opacity: 1;
    }

    .athlete-name {
      font-size: 40px;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
      line-height: 1.1;
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .team-logo {
      height: 32px;
      width: auto;
    }

    .team-name {
      font-size: 28px;
      color: #d1d5db;
      text-transform: uppercase;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    }

    .place-time {
      font-size: 32px;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
      margin-top: 8px;
    }

    /* Solid curtain - slides in from right during curtain phase */
    .curtain-solid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateX(100%);
      transition: none;
    }

    .curtain-solid.slide-in {
      animation: slideInFromRight 0.5s ease-out forwards;
    }

    .curtain-solid .logo {
      height: 140px;
      width: auto;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
    }

    @keyframes slideInFromRight {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    /* Split curtain panels - for reveal animation */
    .split-left, .split-right {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      opacity: 0;
    }

    .split-left {
      left: 0;
    }

    .split-right {
      right: 0;
    }

    .split-left.visible, .split-right.visible {
      opacity: 1;
    }

    .split-left.split-open {
      transform: translateX(-100%);
      transition: transform 0.6s ease-in-out;
    }

    .split-right.split-open {
      transform: translateX(100%);
      transition: transform 0.6s ease-in-out;
    }

    /* Logo positioning in split panels */
    .split-left .logo-container {
      position: absolute;
      left: 50%; /* Will be at center when both halves together */
      transform: translateX(-50%);
    }

    .split-right .logo-container {
      position: absolute;
      right: 50%;
      transform: translateX(50%);
    }

    .split-left .logo, .split-right .logo {
      height: 140px;
      width: auto;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
    }

    /* Phase indicator for debugging */
    .phase-indicator {
      margin-top: 20px;
      font-size: 18px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="controls">
    <button onclick="triggerAnimation()">Assign Athlete</button>
    <button onclick="clearAthlete()">Clear</button>
  </div>

  <div class="board" id="board">
    <!-- Background gradient layer -->
    <div class="background-layer" id="bgLayer"></div>

    <!-- Header layer (event name + separator) -->
    <div class="header-layer" id="headerLayer">
      <div class="header-text">Men's 8K Championship</div>
      <div class="header-line"></div>
    </div>

    <!-- Athlete content layer -->
    <div class="content-layer" id="contentLayer">
      <div class="athlete-name">JOHN SMITH</div>
      <div class="team-row">
        <img class="team-logo" src="https://via.placeholder.com/32x32/1e3a8a/ffffff?text=T" alt="Team">
        <span class="team-name">STATE UNIVERSITY</span>
      </div>
      <div class="place-time">PLACE 1 • 23:45.6</div>
    </div>

    <!-- Solid curtain (slides in from right) -->
    <div class="curtain-solid" id="curtainSolid" style="background-color: #1e3a8a;">
      <img class="logo" src="https://via.placeholder.com/140x140/1e3a8a/ffffff?text=LOGO" alt="Team Logo">
    </div>

    <!-- Split curtain panels (for reveal animation) -->
    <div class="split-left" id="splitLeft" style="background-color: #1e3a8a;">
      <div class="logo-container">
        <img class="logo" src="https://via.placeholder.com/140x140/1e3a8a/ffffff?text=LOGO" alt="Team Logo">
      </div>
    </div>
    <div class="split-right" id="splitRight" style="background-color: #1e3a8a;">
      <div class="logo-container">
        <img class="logo" src="https://via.placeholder.com/140x140/1e3a8a/ffffff?text=LOGO" alt="Team Logo">
      </div>
    </div>
  </div>

  <div class="phase-indicator" id="phaseIndicator">Phase: idle</div>

  <script>
    /**
     * PICTURE BOARD TRANSITION ANIMATION
     * 
     * Animation Sequence (Total: ~2 seconds):
     * 
     * 1. CURTAIN PHASE (500ms)
     *    - Solid colored panel slides in from RIGHT to LEFT
     *    - Panel shows team logo centered
     *    - Panel color matches team's primary color
     * 
     * 2. HEADER PHASE (500ms)
     *    - Event header text fades in at top
     *    - Header separator line appears
     *    - Curtain remains covering content
     * 
     * 3. REVEAL PHASE (500ms)
     *    - Solid curtain is replaced by two split panels
     *    - Left panel slides LEFT (off screen)
     *    - Right panel slides RIGHT (off screen)
     *    - Logo appears to split in half as panels separate
     * 
     * 4. CONTENT PHASE (immediate)
     *    - Athlete content fades in
     *    - Name, team, place/time visible
     *    - Split panels now off-screen
     */

    let currentPhase = 'idle';
    let timeouts = [];

    function setPhase(phase) {
      currentPhase = phase;
      document.getElementById('phaseIndicator').textContent = `Phase: ${phase}`;
    }

    function clearTimeouts() {
      timeouts.forEach(t => clearTimeout(t));
      timeouts = [];
    }

    function resetElements() {
      const curtainSolid = document.getElementById('curtainSolid');
      const splitLeft = document.getElementById('splitLeft');
      const splitRight = document.getElementById('splitRight');
      const headerLayer = document.getElementById('headerLayer');
      const contentLayer = document.getElementById('contentLayer');

      // Reset all elements to initial state
      curtainSolid.classList.remove('slide-in');
      curtainSolid.style.transform = 'translateX(100%)';
      
      splitLeft.classList.remove('visible', 'split-open');
      splitLeft.style.transform = '';
      
      splitRight.classList.remove('visible', 'split-open');
      splitRight.style.transform = '';
      
      headerLayer.classList.remove('visible');
      contentLayer.classList.remove('visible');
    }

    function triggerAnimation() {
      clearTimeouts();
      resetElements();

      const curtainSolid = document.getElementById('curtainSolid');
      const splitLeft = document.getElementById('splitLeft');
      const splitRight = document.getElementById('splitRight');
      const headerLayer = document.getElementById('headerLayer');
      const contentLayer = document.getElementById('contentLayer');

      // You can customize the team color here
      const teamColor = '#1e3a8a'; // Example: dark blue
      curtainSolid.style.backgroundColor = teamColor;
      splitLeft.style.backgroundColor = teamColor;
      splitRight.style.backgroundColor = teamColor;

      // PHASE 1: Curtain slides in from right (500ms)
      setPhase('curtain');
      curtainSolid.classList.add('slide-in');

      timeouts.push(setTimeout(() => {
        // PHASE 2: Header fades in (500ms)
        setPhase('header');
        headerLayer.classList.add('visible');

        timeouts.push(setTimeout(() => {
          // PHASE 3: Reveal - split curtain opens (500ms)
          setPhase('reveal');
          
          // Hide solid curtain, show split panels
          curtainSolid.style.opacity = '0';
          splitLeft.classList.add('visible');
          splitRight.classList.add('visible');

          // Small delay then trigger split animation
          timeouts.push(setTimeout(() => {
            splitLeft.classList.add('split-open');
            splitRight.classList.add('split-open');
            
            // PHASE 4: Content visible
            timeouts.push(setTimeout(() => {
              setPhase('content');
              contentLayer.classList.add('visible');
            }, 300));
          }, 50));

        }, 500));
      }, 500));
    }

    function clearAthlete() {
      clearTimeouts();
      
      const curtainSolid = document.getElementById('curtainSolid');
      const splitLeft = document.getElementById('splitLeft');
      const splitRight = document.getElementById('splitRight');
      const headerLayer = document.getElementById('headerLayer');
      const contentLayer = document.getElementById('contentLayer');

      // Fade out content
      setPhase('exiting');
      contentLayer.classList.remove('visible');
      headerLayer.classList.remove('visible');

      timeouts.push(setTimeout(() => {
        resetElements();
        curtainSolid.style.opacity = '1';
        setPhase('idle');
      }, 500));
    }
  </script>
</body>
</html>
